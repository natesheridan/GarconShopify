<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="gmark-distress" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" result="distorted"/>
    </filter>
    <mask id="gmark-slash-mask">
      <rect width="120" height="120" fill="white"/>
      <!-- Slash cuts through the G -->
      <polygon points="48,10 52,10 46,110 42,110" fill="black"/>
      <polygon points="72,10 75,10 70,110 67,110" fill="black"/>
      <!-- Horizontal scratch -->
      <rect x="10" y="38" width="100" height="1" fill="black" opacity="0.5"/>
      <rect x="10" y="82" width="100" height="0.7" fill="black" opacity="0.35"/>
    </mask>
  </defs>

  <!-- Dark square background with purple border -->
  <rect width="120" height="120" fill="#090909" rx="2"/>
  <rect x="1" y="1" width="118" height="118" fill="none" stroke="#8B5CF6" stroke-width="2" rx="2"/>

  <!-- G lettermark, distressed and slashed -->
  <g filter="url(#gmark-distress)" mask="url(#gmark-slash-mask)">
    <text
      x="12"
      y="100"
      font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
      font-size="108"
      font-weight="900"
      fill="#EBEBEB"
      transform="skewX(-5)"
    >G</text>
  </g>

  <!-- Purple accent line at bottom -->
  <rect x="0" y="115" width="120" height="3" fill="#8B5CF6"/>
  <circle cx="3" cy="116" r="2.5" fill="#8B5CF6"/>
  <circle cx="117" cy="116" r="2.5" fill="#8B5CF6"/>
</svg>
